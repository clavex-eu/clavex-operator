---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clavexclients.clavex.clavex.eu
spec:
  group: clavex.clavex.eu
  names:
    categories:
    - clavex
    kind: ClavexClient
    listKind: ClavexClientList
    plural: clavexclients
    shortNames:
    - cvxclient
    singular: clavexclient
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.orgRef
      name: Org
      type: string
    - jsonPath: .spec.clientId
      name: ClientID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClavexClient is the Schema for the clavexclients API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClavexClient
            properties:
              authSecretRef:
                description: |-
                  authSecretRef points to a Secret containing the credentials used to
                  reconcile this client against the Admin API. The Secret MUST contain
                  two data keys:
                    - apiKey (or the name set in Key): an org-scoped Clavex API key
                      (org_id scoping added in migration 000177_org_scoped_admin_api_keys)
                    - orgId: the UUID of the organisation that key is scoped to — used
                      verbatim as the {org_id} path segment. Whoever mints the API key
                      already knows this UUID (it's returned by org creation / the
                      superadmin API-key-creation call), so the controller never needs
                      superadmin privileges to resolve orgRef (slug) to an ID itself.

                  If namespace is omitted, it defaults to the CR's own namespace to
                  avoid accidental cross-namespace secret reads.
                properties:
                  key:
                    description: |-
                      key is the Secret data key holding the value. Defaults to "apiKey"
                      for authSecretRef and "clientSecret" for clientSecretRef (defaulting
                      is enforced by the reconciler, not the CRD schema, since the default
                      differs by field).
                    type: string
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              clientId:
                description: |-
                  clientId is the stable reconciliation key. If a client with this ID
                  already exists in orgRef it is updated (PATCH); otherwise created.
                  Immutable after creation (changing it would orphan the old client).
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: clientId is immutable
                  rule: self == oldSelf
              clientSecretRef:
                description: |-
                  clientSecretRef optionally points to a Secret from which the
                  controller reads/writes the confidential client secret. Never
                  inlined in the spec (mirrors IDPSpec's exclusion of ClientSecret
                  from export in iac.go). Left nil for public clients.
                properties:
                  key:
                    description: |-
                      key is the Secret data key holding the value. Defaults to "apiKey"
                      for authSecretRef and "clientSecret" for clientSecretRef (defaulting
                      is enforced by the reconciler, not the CRD schema, since the default
                      differs by field).
                    type: string
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              grantTypes:
                items:
                  type: string
                minItems: 1
                type: array
              idTokenSignedResponseAlg:
                enum:
                - RS256
                - RS384
                - RS512
                - ES256
                - ES384
                - ES512
                - PS256
                - PS384
                - PS512
                type: string
              isActive:
                default: true
                type: boolean
              isPublic:
                default: false
                type: boolean
              name:
                minLength: 1
                type: string
              orgRef:
                description: |-
                  orgRef identifies the Clavex organisation that owns this client, for
                  display/human reference (e.g. "kubectl get" output, logs). It matches
                  org.slug in the Admin API. It is NOT used to resolve the org for API
                  calls: the org-scoped API key in authSecretRef can only call
                  /api/v1/organizations/{org_id}/... for its own org, and it has no
                  permission to list/resolve orgs by slug (that endpoint is
                  superadmin-only). The actual org UUID used on the wire comes from the
                  "orgId" key in the same Secret — see authSecretRef.
                minLength: 1
                type: string
              postLogoutRedirectUris:
                items:
                  type: string
                type: array
              redirectUris:
                items:
                  type: string
                minItems: 1
                type: array
              responseTypes:
                items:
                  type: string
                type: array
              scopes:
                items:
                  type: string
                type: array
              tokenEndpointAuthMethod:
                enum:
                - none
                - client_secret_basic
                - client_secret_post
                - private_key_jwt
                type: string
            required:
            - authSecretRef
            - clientId
            - grantTypes
            - name
            - orgRef
            - redirectUris
            type: object
            x-kubernetes-validations:
            - message: 'public clients must use tokenEndpointAuthMethod: none'
              rule: self.isPublic == false || !has(self.tokenEndpointAuthMethod) ||
                self.tokenEndpointAuthMethod == 'none'
          status:
            description: status defines the observed state of ClavexClient
            properties:
              clavexClientId:
                description: |-
                  clavexClientId is the immutable client_id echoed back for
                  operator/debugging convenience (equal to spec.clientId once synced).
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the ClavexClient resource.
                  Expected types: "Ready", "Synced".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncedAt:
                description: |-
                  lastSyncedAt is the RFC3339 timestamp of the last successful
                  reconciliation against the Admin API.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

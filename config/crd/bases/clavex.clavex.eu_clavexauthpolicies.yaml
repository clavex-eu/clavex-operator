---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clavexauthpolicies.clavex.clavex.eu
spec:
  group: clavex.clavex.eu
  names:
    categories:
    - clavex
    kind: ClavexAuthPolicy
    listKind: ClavexAuthPolicyList
    plural: clavexauthpolicies
    shortNames:
    - cvxauthpolicy
    singular: clavexauthpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.orgRef
      name: Org
      type: string
    - jsonPath: .spec.action
      name: Action
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClavexAuthPolicy is the Schema for the clavexauthpolicies API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClavexAuthPolicy
            properties:
              action:
                description: action is the outcome applied when all conditions match.
                enum:
                - allow
                - deny
                - require_mfa
                - step_up
                type: string
              authSecretRef:
                description: |-
                  authSecretRef points to a Secret containing the org-scoped Admin
                  API credentials used to reconcile this rule. See
                  ClavexClientSpec.AuthSecretRef for the required Secret shape
                  (apiKey + orgId keys).
                properties:
                  key:
                    description: |-
                      key is the Secret data key holding the value. Defaults to "apiKey"
                      for authSecretRef and "clientSecret" for clientSecretRef (defaulting
                      is enforced by the reconciler, not the CRD schema, since the default
                      differs by field).
                    type: string
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              conditions:
                description: |-
                  conditions holds the optional match criteria for this rule. A nil
                  field within Conditions means "no constraint on that signal".
                properties:
                  clientIds:
                    description: clientIds restricts the rule to specific OIDC client_id
                      values.
                    items:
                      type: string
                    type: array
                  countries:
                    description: countries is an ISO 3166-1 alpha-2 allowlist.
                    items:
                      type: string
                    type: array
                  daysOfWeek:
                    description: |-
                      daysOfWeek restricts the rule to specific UTC days
                      ("Mon","Tue",...).
                    items:
                      type: string
                    type: array
                  hourRange:
                    description: hourRange restricts the rule to a UTC hour window
                      (0-23).
                    properties:
                      from:
                        maximum: 23
                        minimum: 0
                        type: integer
                      to:
                        maximum: 23
                        minimum: 0
                        type: integer
                    required:
                    - from
                    - to
                    type: object
                  ipCidrs:
                    description: |-
                      ipCidrs is an IP CIDR allowlist — matches if the request IP is in
                      any of these ranges.
                    items:
                      type: string
                    type: array
                  lastLoginBefore:
                    description: |-
                      lastLoginBefore matches users whose last login is older than this
                      Go duration string (e.g. "720h"). Users who never logged in always
                      match.
                    type: string
                  mfaEnrolled:
                    description: |-
                      mfaEnrolled matches users who have (true) or have not (false)
                      enrolled in MFA. Omit for no constraint.
                    type: boolean
                  newCountry:
                    description: |-
                      newCountry matches logins from a country not seen in the user's
                      90-day baseline. Omit for no constraint.
                    type: boolean
                  notCountries:
                    description: notCountries is an ISO 3166-1 alpha-2 denylist.
                    items:
                      type: string
                    type: array
                type: object
              enabled:
                default: true
                description: enabled allows the rule to be disabled without deleting
                  it.
                type: boolean
              name:
                description: name is the stable reconciliation key (see the type doc
                  above).
                minLength: 1
                type: string
              orgRef:
                description: |-
                  orgRef identifies the Clavex organisation that owns this policy
                  rule, for display/human reference only — see
                  ClavexClientSpec.OrgRef for why it cannot be used to resolve the
                  org for API calls.
                minLength: 1
                type: string
              priority:
                default: 100
                description: |-
                  priority controls evaluation order — lower numbers are checked
                  first. Rules with equal priority are evaluated in declaration
                  order server-side.
                type: integer
            required:
            - action
            - authSecretRef
            - name
            - orgRef
            type: object
          status:
            description: status defines the observed state of ClavexAuthPolicy
            properties:
              clavexAuthPolicyId:
                description: |-
                  clavexAuthPolicyId is the Admin API's opaque UUID for this rule,
                  once synced.
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the ClavexAuthPolicy
                  resource. Expected types: "Ready", "Synced".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncedAt:
                description: |-
                  lastSyncedAt is the RFC3339 timestamp of the last successful
                  reconciliation against the Admin API.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
